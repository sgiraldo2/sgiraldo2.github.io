<!-- html doc -->
<html>
  <head>
    <title>Santiago Giraldo | Number Game</title>
    <link rel="stylesheet" type="text/css" href="/style.css" />
    <script src="/script.js"></script>
    <link
      rel="stylesheet"
      type="text/css"
      href="/pages/numberguess/numberstyle.css"
    />

    <!-- font awesome for icons -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.3.0/css/all.min.css"
      integrity="sha512-SzlrxWUlpfuzQ+pcUCosxcglQRNAq/DZjVsC0lE40xsADsfeQoEypE+enwcOiGjk/bSuGGKHEyjSoQ1zVisanQ=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
  </head>
  <body>
    <!-- begin navbar -->
    <nav>
      <ul>
        <li><a href="/">Home</a></li>
        <li><a href="/about">About Me</a></li>
        <li class="dropdown">
          <a href="/pages" class="dropbtn">Pages</a>
          <div class="dropdown-content">
            <a href="/pages/changeback">Random Background</a>
            <a href="/pages/feedback">Feedback</a>
            <a href="/pages/numberguess">Guess Number</a>
            <a href="/pages/page4">Page 4</a>
            <a href="/pages/page5">Page 5</a>
          </div>
        </li>
        <li class="dropdown">
          <a href="/products" class="dropbtn">Products</a>
          <div class="dropdown-content">
            <a href="products/product1">Product 1</a>
            <a href="products/product2">Product 2</a>
            <a href="products/product3">Product 3</a>
          </div>
        </li>
        <li><a href="/contact">Contact</a></li>
        <button id="toggleButton" onclick="toggleDarkMode()">Dark Mode</button>
      </ul>
    </nav>
    <!-- end navbar -->
    <div class="main-container">
      <div class="container">
        <h1>Guess a Number Between 1 and 100</h1>
        <p>Turns left: <span id="turns-left">10</span></p>
        <input
          type="number"
          id="user-guess"
          placeholder="Enter your guess here"
        />
        <button id="submit-guess">Submit Guess</button>
        <p id="result-message"></p>
        <button id="restart-button" style="display: none">Play Again</button>
      </div>
      <div class="main-bottom"></div>
    </div>
    <script src="/pages/numberguess/numberscript.js"></script>
  </body>
</html>
