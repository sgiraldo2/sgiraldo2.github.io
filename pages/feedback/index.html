<!-- html doc -->
<html>
  <head>
    <title>Santiago Giraldo</title>
    <link rel="stylesheet" type="text/css" href="../../style.css" />
    <link rel="stylesheet" type="text/css" href="feedbackstyle.css" />
    <script src="feedbackscript.js"></script>
    <!-- font awesome for icons -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.3.0/css/all.min.css"
      integrity="sha512-SzlrxWUlpfuzQ+pcUCosxcglQRNAq/DZjVsC0lE40xsADsfeQoEypE+enwcOiGjk/bSuGGKHEyjSoQ1zVisanQ=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
  </head>
  <body>
    <!-- begin navbar -->
    <nav>
      <ul>
        <li><a href="/">Home</a></li>
        <li><a href="/about">About Me</a></li>
        <li class="dropdown">
          <a href="/pages" class="dropbtn">Pages</a>
          <div class="dropdown-content">
            <a href="/pages/changeback">Random Background</a>
            <a href="/pages/feedback">Feedback</a>
            <a href="/pages/numberguess">Guess Number</a>
            <a href="/pages/page4">Page 4</a>
            <a href="/pages/page5">Page 5</a>
          </div>
        </li>
        <li class="dropdown">
          <a href="/products" class="dropbtn">Products</a>
          <div class="dropdown-content">
            <a href="products/product1">Product 1</a>
            <a href="products/product2">Product 2</a>
            <a href="products/product3">Product 3</a>
          </div>
        </li>
        <li><a href="/contact">Contact</a></li>
      </ul>
    </nav>
    <!-- end navbar -->
    <div class="main-container">
      <div class="main-bottom">
        <div class="form-container">
          <!-- <h1>Email Verification and Submission Form</h1> -->
          <form onsubmit="submitForm(event)">
            <h1>Your Feedback</h1>
            <label for="feedback">Rating:</label>
            <div class="rating">
              <input type="radio" id="star5" name="rating" value="5" />
              <label for="star5" title="5 stars">&#9733;</label>
              <input type="radio" id="star4" name="rating" value="4" />
              <label for="star4" title="4 stars">&#9733;</label>
              <input type="radio" id="star3" name="rating" value="3" />
              <label for="star3" title="3 stars">&#9733;</label>
              <input type="radio" id="star2" name="rating" value="2" />
              <label for="star2" title="2 stars">&#9733;</label>
              <input type="radio" id="star1" name="rating" value="1" />
              <label for="star1" title="1 star">&#9733;</label>
            </div>
            <label for="email">Email:</label>
            <input
              type="email"
              id="email"
              name="email"
              placeholder="Enter your email"
              required
            />
            <div class="feedback">
              <label for="feedback">Feedback:</label>
              <textarea
                id="feedback"
                name="feedback"
                placeholder="Write your feedback here..."
              ></textarea>
            </div>
            <p id="error-message"></p>
            <button type="submit">Submit</button>
          </form>
        </div>
      </div>
    </div>
  </body>
</html>
