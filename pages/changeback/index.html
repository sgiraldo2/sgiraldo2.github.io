<!-- html doc -->
<html>
  <head>
    <title>Santiago Giraldo</title>
    <link rel="stylesheet" type="text/css" href="/style.css" />
    <!-- font awesome for icons -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.3.0/css/all.min.css"
      integrity="sha512-SzlrxWUlpfuzQ+pcUCosxcglQRNAq/DZjVsC0lE40xsADsfeQoEypE+enwcOiGjk/bSuGGKHEyjSoQ1zVisanQ=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <style>
      .change-btn-cont {
        display: flex;
        justify-content: center;
      }
      #btn-change-color {
        padding: 1em 2em;
        border-radius: 4px;
        font-size: 1.2em;
        background-color: #007bff;
        color: #fff;
        border: none;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <!-- begin navbar -->
    <nav>
      <ul>
        <li><a href="/">Home</a></li>
        <li><a href="/about">About Me</a></li>
        <li class="dropdown">
          <a href="/pages" class="dropbtn">Pages</a>
          <div class="dropdown-content">
            <a href="/pages/changeback">Random Background</a>
            <a href="/pages/feedback">Feedback</a>
            <a href="/pages/numberguess">Guess Number</a>
            <a href="/pages/page4">Page 4</a>
            <a href="/pages/page5">Page 5</a>
          </div>
        </li>
        <li class="dropdown">
          <a href="/products" class="dropbtn">Products</a>
          <div class="dropdown-content">
            <a href="products/product1">Product 1</a>
            <a href="products/product2">Product 2</a>
            <a href="products/product3">Product 3</a>
          </div>
        </li>
        <li><a href="/contact">Contact</a></li>
      </ul>
    </nav>
    <!-- end navbar -->
    <div class="change-btn-cont">
      <button id="btn-change-color">Change Background Color</button>
    </div>
    <script>
      const btnChangeColor = document.querySelector('#btn-change-color');
      const body = document.querySelector('body');

      function getRandomColor() {
        const letters = '0123456789ABCDEF';
        let color = '#';
        for (let i = 0; i < 6; i++) {
          color += letters[Math.floor(Math.random() * 16)];
        }
        return color;
      }

      btnChangeColor.addEventListener('click', () => {
        const randomColor = getRandomColor();
        body.style.backgroundColor = randomColor;
        alert(`The hex code of the new background color is: ${randomColor}`);
      });
    </script>
  </body>
</html>
